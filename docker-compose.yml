services:
  orbital-ops:
    # `docker compose pull` grabs the CI-built image; `docker compose up
    # --build` still builds locally when you want to.
    image: ghcr.io/petrvalik/cesium-satellite-tracker:latest
    build: .
    restart: unless-stopped
    ports:
      # bind to localhost only — a reverse proxy (Caddy/nginx) terminates TLS
      - '127.0.0.1:8787:8787'
    environment:
      # optional feeds — see apps/api/.env.example
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
      TRUST_PROXY: '1'
    volumes:
      - orbital-ops-data:/data

volumes:
  orbital-ops-data:
